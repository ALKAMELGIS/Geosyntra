# GeoSyntra dual-stack nginx — www (React), api (Express :3001), app (Axum :3003).
# Install on Ubuntu: sudo cp scripts/nginx-geosyntra-dual-stack.conf /etc/nginx/sites-available/geosyntra
# sudo ln -sf /etc/nginx/sites-available/geosyntra /etc/nginx/sites-enabled/
# sudo certbot --nginx -d www.geosyntra.org -d geosyntra.org -d api.geosyntra.org -d app.geosyntra.org
#
# PRODUCTION POLICY: api → Express only. app → Axum+Dioxus only. Do not swap until cutover.

proxy_cache_path /var/cache/nginx/mapbox levels=1:2 keys_zone=mapbox_cache:128m max_size=4g inactive=14d use_temp_path=off;

# --- www.geosyntra.org — React static (main UI) ---
server {
    listen 80;
    server_name www.geosyntra.org geosyntra.org;

    root /var/www/geosyntra-react;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- api.geosyntra.org — Express production API (:3001) ---
server {
    listen 80;
    server_name api.geosyntra.org;
    client_max_body_size 25m;

    location /api/mapbox-proxy {
        proxy_cache mapbox_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_revalidate on;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# --- app.geosyntra.org — Axum + Dioxus preview (:3003) ---
server {
    listen 80;
    server_name app.geosyntra.org;
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Stripe webhooks: do not buffer body
        proxy_request_buffering off;
    }
}
