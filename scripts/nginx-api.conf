# GeoSyntra API (Hostinger VPS) — enable Cloudflare orange-cloud on api.geosyntra.org
# for edge caching of /api/mapbox-proxy tile responses (honors Cache-Control from Node).

proxy_cache_path /var/cache/nginx/mapbox levels=1:2 keys_zone=mapbox_cache:128m max_size=4g inactive=14d use_temp_path=off;

server {
    listen 80;
    server_name api.geosyntra.org;
    client_max_body_size 25m;

    # Mapbox tile proxy — origin-side cache (Cloudflare CDN caches the same URLs at the edge).
    location /api/mapbox-proxy {
        proxy_cache mapbox_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_revalidate on;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
