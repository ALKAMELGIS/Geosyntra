name: Dioxus E2E

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'packages/**'
      - 'e2e/dioxus/**'
      - 'scripts/ci-dioxus-e2e.sh'
      - 'scripts/run-dioxus-playwright.sh'
      - 'scripts/dev-postgres.sh'
      - '.github/workflows/dioxus-e2e.yml'
  push:
    branches: [feature/axum-migration]

concurrency:
  group: dioxus-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/dioxus/package-lock.json

      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client postgresql

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version 0.7.9 --locked

      - name: Install Playwright deps
        working-directory: e2e/dioxus
        run: |
          npm ci --no-audit --no-fund
          npx playwright install chromium --with-deps

      - name: Run Dioxus Playwright E2E
        run: bash scripts/ci-dioxus-e2e.sh
