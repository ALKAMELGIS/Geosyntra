name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: touch frontend/dist/.nojekyll
      - run: node -e "const fs=require('fs'); const html=fs.readFileSync('frontend/dist/index.html','utf8'); if (html.includes('/src/main.tsx')) { console.error('dist/index.html still points to Vite dev entry (/src/main.tsx).'); process.exit(1); } if (!/assets\\/index-[^\"\\s]+\\.js/.test(html)) { console.error('dist/index.html does not reference built assets.'); process.exit(1); } console.log('Pages build sanity-check OK.');"
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: frontend/dist
