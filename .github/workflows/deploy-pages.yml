name: Deploy to GitHub Pages

# Publishes frontend/dist to the orphan branch `gh-pages` on every push to main.
# GitHub Pages must serve that branch (not `main` at repo root — root has the yellow stub only).
#
# Repo admin (one-time): Settings → Pages → Build and deployment
#   • Source: Deploy from a branch
#   • Branch: gh-pages  /  Folder: / (root)
#   OR Source: GitHub Actions — then also enable the optional deploy job below if you prefer artifact deploy.
#
# Live app (HashRouter): https://alkamelgis.github.io/AgroCloud/#/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Prepare Pages dist + sanity-check
        run: node scripts/pages-dist-check.mjs
      - name: Push site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
      - name: Reminder — Pages branch
        run: |
          echo "::notice title=GitHub Pages::Set Settings → Pages → Deploy from branch → gh-pages / (root). Do not use main at / or you will see the yellow stub index.html."
