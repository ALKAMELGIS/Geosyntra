name: Deploy to GitHub Pages

# CI builds the SPA with empty public env vars, copies frontend/dist to repo root on main,
# then pushes [pages-sync]. GitHub Pages: Deploy from a branch → main → /(root).
# Live app (HashRouter): https://alkamelgis.github.io/AgroCloud/#/
#
# Root SPA files are gitignored — never commit them from a local machine (local .env would embed secrets).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish-to-main-root:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[pages-sync]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Build SPA for GitHub Pages (no local .env — safe for push protection)
        env:
          VITE_MAPBOX_TOKEN: ''
          VITE_GOOGLE_MAPS_API_KEY: ''
          VITE_ARCGIS_PORTAL_TOKEN: ''
          VITE_SENTINEL_HUB_WMS_INSTANCE_ID: ''
          VITE_SENTINEL_HUB_ACCESS_TOKEN: ''
          VITE_GEMINI_API_KEY: ''
          VITE_CLAUDE_API_KEY: ''
          VITE_DEEPSEEK_API_KEY: ''
        run: npm run build
      - name: Prepare Pages dist + sanity-check
        run: node scripts/pages-dist-check.mjs
      - name: Sync dist to repository root and push main
        run: |
          set -euo pipefail
          node scripts/sync-pages-dist-to-root.mjs --git-add
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No SPA changes to commit at repo root."
            exit 0
          fi
          git commit -m "chore(pages): sync SPA build to repo root [pages-sync]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
      - name: Drop legacy gh-pages branch (optional)
        continue-on-error: true
        run: git push origin --delete gh-pages
      - name: Summary
        run: |
          {
            echo "## GitHub Pages (main / root)"
            echo "تم نسخ البناء إلى جذر \`main\` (بدون أسرار من .env المحلي). الإعدادات: **Deploy from a branch** → **main** → **/(root)**."
            echo ""
            echo "| App |"
            echo "| --- |"
            echo "| [https://alkamelgis.github.io/AgroCloud/#/](https://alkamelgis.github.io/AgroCloud/#/) |"
          } >> "$GITHUB_STEP_SUMMARY"
