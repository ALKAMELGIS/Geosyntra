name: Deploy to GitHub Pages

# Single publishing path: GitHub Actions → Pages artifact (build_type: workflow).
# The live site does NOT depend on any branch root (no main vs gh-pages mismatch).
# Live app (HashRouter): https://alkamelgis.github.io/AgroCloud/#/
#
# First run: approve the `github-pages` environment if GitHub prompts (repo Settings → Environments).
# If the API step cannot set workflow mode, add secret PAGES_ADMIN_TOKEN (see scripts/ensure-pages-workflow-build.mjs).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Force Pages to publish only from this workflow (not from a branch)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
        run: node scripts/ensure-pages-workflow-build.mjs
      - run: npm ci --no-audit --no-fund
      - name: Build SPA for GitHub Pages
        env:
          VITE_MAPBOX_TOKEN: ''
          VITE_GOOGLE_MAPS_API_KEY: ''
          VITE_ARCGIS_PORTAL_TOKEN: ''
          VITE_SENTINEL_HUB_WMS_INSTANCE_ID: ''
          VITE_SENTINEL_HUB_ACCESS_TOKEN: ''
          VITE_GEMINI_API_KEY: ''
          VITE_CLAUDE_API_KEY: ''
          VITE_DEEPSEEK_API_KEY: ''
        run: npm run build
      - name: Prepare Pages dist + sanity-check
        run: node scripts/pages-dist-check.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - name: Summary
        run: |
          {
            echo "## GitHub Pages"
            echo "المصدر الوحيد للنشر: **GitHub Actions** (أرشيف البناء). لا تغيّر المصدر إلى «نشر من فرع» في الإعدادات."
            echo ""
            echo "**Single source:** workflow artifact only. Do not set Pages to **Deploy from a branch**."
            echo ""
            echo "| URL |"
            echo "| --- |"
            echo "| [Open app](https://alkamelgis.github.io/AgroCloud/#/) |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
