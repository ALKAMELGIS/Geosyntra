name: Deploy to GitHub Pages

# Always pushes the built site to the orphan branch `gh-pages` (works with
# Settings → Pages → Deploy from a branch → gh-pages / root).
#
# Optionally also deploys via the GitHub Pages artifact API when the repo uses
# Source: GitHub Actions — if not configured, that job is skipped without failing the run.
#
# Live app (HashRouter): https://alkamelgis.github.io/AgroCloud/#/
#
# Root fix for the "yellow stub" page: either set Pages → gh-pages / (root) manually,
# or add repo secret PAGES_ADMIN_TOKEN (PAT with repo or Administration on this repo);
# the workflow then calls the GitHub API to point legacy Pages at gh-pages after each push.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      # Public Pages build must not embed repo secrets (push protection blocks them on any branch).
      - name: Build SPA for GitHub Pages
        env:
          VITE_MAPBOX_TOKEN: ''
          VITE_GOOGLE_MAPS_API_KEY: ''
          VITE_ARCGIS_PORTAL_TOKEN: ''
          VITE_SENTINEL_HUB_WMS_INSTANCE_ID: ''
          VITE_SENTINEL_HUB_ACCESS_TOKEN: ''
          VITE_GEMINI_API_KEY: ''
          VITE_CLAUDE_API_KEY: ''
          VITE_DEEPSEEK_API_KEY: ''
        run: npm run build
      - name: Prepare Pages dist + sanity-check
        run: node scripts/pages-dist-check.mjs
      - name: Push site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
      - name: Point GitHub Pages at gh-pages (optional PAT — fixes wrong branch from CI)
        env:
          PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          {
            echo "## GitHub Pages"
            echo ""
            echo "| Issue | Action |"
            echo "| --- | --- |"
            echo "| Live URL shows the **stub / help** page | [**Settings → Pages**](https://github.com/${GITHUB_REPOSITORY}/settings/pages) → **Deploy from a branch** → **gh-pages** → **/(root)** (not \`main\`). |"
            echo "| Want this **fixed automatically** on each deploy | Add repo secret **\`PAGES_ADMIN_TOKEN\`**: classic PAT with **repo** scope, *or* fine-grained PAT with **Administration** + **Contents** (read/write) on this repository only. |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -z "${PAGES_ADMIN_TOKEN:-}" ]; then
            echo "::notice title=GitHub Pages::Optional: add secret PAGES_ADMIN_TOKEN to auto-point Pages at gh-pages, or set branch manually in Settings → Pages."
            exit 0
          fi

          export GH_TOKEN="$PAGES_ADMIN_TOKEN"
          REPO="${GITHUB_REPOSITORY}"
          TMP="$(mktemp)"
          trap "rm -f \"$TMP\" /tmp/gh-pages-api.json" EXIT
          jq -n '{build_type:"legacy", source:{branch:"gh-pages", path:"/"}}' >"$TMP"

          code="$(gh api "repos/${REPO}/pages" -H "Accept: application/vnd.github+json" -w "%{http_code}" -o /tmp/gh-pages-api.json 2>/dev/null || echo 000)"
          if [ "$code" = "200" ]; then
            bt="$(jq -r '.build_type // empty' /tmp/gh-pages-api.json)"
            if [ "$bt" = "workflow" ]; then
              echo "::notice title=GitHub Pages::Site uses GitHub Actions workflow build; not switching to legacy branch via API."
              exit 0
            fi
            cur="$(jq -r '.source.branch // empty' /tmp/gh-pages-api.json)"
            if [ "$cur" = "gh-pages" ]; then
              echo "::notice title=GitHub Pages::Pages already publishes from gh-pages."
              exit 0
            fi
            if gh api "repos/${REPO}/pages" --method PUT --input "$TMP"; then
              echo "::notice title=GitHub Pages::Updated Pages source to gh-pages / (root) via API."
            else
              echo "::warning title=GitHub Pages::PUT /pages failed (check PAT: repo or Administration on this repo)."
            fi
          elif [ "$code" = "404" ]; then
            if gh api "repos/${REPO}/pages" --method POST --input "$TMP"; then
              echo "::notice title=GitHub Pages::Enabled Pages with source gh-pages / (root) via API."
            else
              echo "::warning title=GitHub Pages::POST /pages failed (enable Pages once in Settings or fix PAT)."
            fi
          else
            echo "::warning title=GitHub Pages::Could not read Pages config (HTTP ${code}). Check PAT permissions (repo or Administration on this repo)."
            exit 0
          fi
      - name: Configure Pages (for Actions-based deploy, if enabled)
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - name: Pages branch reminder
        run: |
          echo "::notice title=GitHub Pages::Primary fix: Settings → Pages → Deploy from branch → gh-pages / (root). Optional: also set Source to GitHub Actions for artifact deploy."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (artifact)
        id: deployment
        uses: actions/deploy-pages@v4
