
version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - GEOSYNTRA_ENV=development
      - DATABASE_URL=postgres://user:password@db:5432/agri_cloud
      - AGRI_DATA_DIR=/data
      - AGRI_USER_DB_PATH=/data/geosyntra_platform.db
      - AGRI_API_SECRETS_FILE=/data/agri_api_secrets.json
      - AGRI_API_VAULT_BACKUP_DIR=/data/api-vault-backups
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
      - geosyntra_api_vault:/data

  db:
    image: postgis/postgis:15-3.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=agri_cloud
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  geosyntra_api_vault:
