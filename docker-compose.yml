
version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://user:password@db:5432/agri_cloud
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgis/postgis:15-3.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=agri_cloud
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
