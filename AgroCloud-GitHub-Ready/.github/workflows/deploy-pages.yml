name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: touch dist/.nojekyll
      - run: node -e "const fs=require('fs'); const html=fs.readFileSync('dist/index.html','utf8'); if (html.includes('/src/main.tsx')) { console.error('dist/index.html still points to Vite dev entry (/src/main.tsx).'); process.exit(1); } if (!/assets\\/index-[^\"\\s]+\\.js/.test(html)) { console.error('dist/index.html does not reference built assets.'); process.exit(1); } console.log('Pages build sanity-check OK.');"
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
