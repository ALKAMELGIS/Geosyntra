<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Avoid stale GitHub Pages / SW shell (old “Opening…” bootstrap) being shown from disk cache. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      ;(function () {
        try {
          var h = typeof location !== 'undefined' ? String(location.hostname || '') : ''
          if (h.indexOf('github.io') === -1) return
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) {
                r.unregister()
              })
            })
          }
          if (typeof caches !== 'undefined' && caches.keys) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) {
                caches.delete(k)
              })
            })
          }
        } catch (_) {}
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#047857" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#020617" />
    <meta name="description" content="Geosyntra Platform — enterprise GIS, satellite intelligence, and operational workflows." />
    <meta name="application-name" content="Geosyntra Platform" />
    <meta name="apple-mobile-web-app-title" content="Geosyntra" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.png" />
    <title>Geosyntra Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
