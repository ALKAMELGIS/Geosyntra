<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Avoid stale GitHub Pages / SW shell (old "Opening…" bootstrap) being shown from disk cache. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      // Defensive bootstrap: any legacy ServiceWorker (or HTTP-cached old shell) is the #1 cause of
      // "I deployed but my changes don't show" on GitHub Pages. Unregister all SWs, drop CacheStorage,
      // and force a single hard reload so the freshly-deployed shell + hashed assets are fetched.
      ;(function () {
        try {
          var KEY = 'gs_pages_sw_purge_v4'
          var hasSW = typeof navigator !== 'undefined' && 'serviceWorker' in navigator
          var hasCaches = typeof caches !== 'undefined' && caches && typeof caches.keys === 'function'
          if (!hasSW && !hasCaches) return
          var alreadyPurged = false
          try { alreadyPurged = sessionStorage.getItem(KEY) === '1' } catch (_) {}
          var hadController = hasSW && Boolean(navigator.serviceWorker.controller)
          var regsP = hasSW
            ? navigator.serviceWorker.getRegistrations().catch(function () { return [] })
            : Promise.resolve([])
          regsP.then(function (regs) {
            var hasAny = (regs && regs.length > 0) || hadController
            if (!hasAny) return
            var unregisters = (regs || []).map(function (r) {
              try { return r.unregister() } catch (_) { return Promise.resolve(false) }
            })
            var cacheCleanup = hasCaches
              ? caches.keys().then(function (keys) {
                  return Promise.all((keys || []).map(function (k) {
                    try { return caches.delete(k) } catch (_) { return Promise.resolve(false) }
                  }))
                }).catch(function () { return [] })
              : Promise.resolve([])
            Promise.all([Promise.all(unregisters), cacheCleanup]).then(function () {
              if (alreadyPurged) return
              try { sessionStorage.setItem(KEY, '1') } catch (_) {}
              try {
                var url = location.pathname + location.search + (location.hash || '')
                window.location.replace(url)
              } catch (_) {
                try { window.location.reload() } catch (__) {}
              }
            })
          })
        } catch (_) {}
      })()
    </script>
    <!-- initial-scale=1 + viewport-fit for notched devices; interactive-widget so mobile keyboards resize layout (GIS panels reflow); no maximum-scale so users can pinch-zoom for accessibility -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#22d3ee" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#05060d" />
    <meta name="description" content="Geosyntra — Geospatial AI platform for satellite intelligence, GIS, and operational workflows." />
    <meta name="application-name" content="Geosyntra" />
    <meta name="apple-mobile-web-app-title" content="Geosyntra" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Modern browsers: prefer the adaptive SVG mark (black on light tabs, white on dark). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <title>Geosyntra · Geospatial AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script data-geosyntra-legacy-auth-redirect="1">
      ;(function () {
        try {
          var g = location.hash || ''
          if (!g.startsWith('#/')) return
          var route = g.slice(2).split('?')[0].replace(/\/$/, '')
          var base = location.pathname || '/'
          if (!base.endsWith('/')) base += '/'
          var origin = location.origin
          if (route === 'app/auth/login') {
            location.replace(origin + base + '?start=1&wizard=auth&mode=signin#/')
            return
          }
          if (route === 'app/auth/register') {
            location.replace(origin + base + '?start=1&wizard=auth&mode=signup#/')
            return
          }
          if (route === 'app/onboarding/trial-start' || route === 'app/billing/pricing') {
            location.replace(origin + base + '?start=1&wizard=pricing#/')
          }
        } catch (_) {}
      })()
    </script>
    <script>
      (function () {
        if (window.location.protocol === 'file:') {
          window.location.replace('http://localhost:5173/Geosyntra/');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
