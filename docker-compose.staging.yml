# Staging — for QA and pre-release testing. Not for end users.
# Usage: docker compose -f docker-compose.staging.yml up

version: '3.8'

services:
  api:
    build: .
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: staging
      GEOSYNTRA_ENV: staging
      AGRI_DATA_DIR: /data
      AGRI_USER_DB_PATH: /data/geosyntra_staging.db
      AGRI_API_SECRETS_FILE: /data/agri_api_secrets_staging.json
    volumes:
      - geosyntra_staging_data:/data
      - .:/app
      - /app/node_modules

volumes:
  geosyntra_staging_data:
